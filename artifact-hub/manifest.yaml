name: sovai-airgap-ai-starter
version: 0.1.0
description: Open-source laptop MVP for an air-gap-ready Sovereign AI artifact supply chain.
runtime:
  container_engine: docker-desktop
  compose_file: docker-compose.yml
  offline_mode_required: true
artifacts:
  images:
    - name: sovai-airgap/app
      tag: "0.1"
      source: artifact-hub/images/sovai-airgap-app.tar
  package_source:
    type: local-wheelhouse
    path: artifact-hub/wheelhouse
  prompts:
    - artifact-hub/prompts/rag-system-prompt.yaml
  approved_tools:
    - artifact-hub/tools/approved-tools.yaml
governance:
  audit_log: data/audit/audit-log.jsonl
  internet_policy: runtime-containers-use-internal-docker-network
  artifact_policy: approved-local-artifacts-only
